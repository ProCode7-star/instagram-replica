#include <iostream>
#include <fstream>
#include <string>

// Usamos la ruta "data/manager.cfg"
void guardarConfiguracion(const std::string& valor) {
    std::ofstream archivo("data/manager.cfg"); 
    if (archivo.is_open()) {
        archivo << valor;
        archivo.close();
    }
}

std::string leerConfiguracion() {
    std::ifstream archivo("data/manager.cfg");
    std::string linea;
    if (archivo.is_open()) {
        std::getline(archivo, linea);
        archivo.close();
    }
    return linea;
}
