<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">Instagram</div>
        <div class="nav-icons">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-paper-plane"></i>
        </div>
    </header>

    <main class="main-container">
        
        <section class="stories-container">
            <div class="story">
                <div class="story-avatar unique"><img src="https://via.placeholder.com/60" alt="Tu Historia"></div>
                <span>Tu historia</span>
            </div>
            <div class="story">
                <div class="story-avatar"><img src="https://via.placeholder.com/60" alt="User 1"></div>
                <span>user_1</span>
            </div>
            <div class="story">
                <div class="story-avatar"><img src="https://via.placeholder.com/60" alt="User 2"></div>
                <span>user_2</span>
            </div>
            <div class="story">
                <div class="story-avatar"><img src="https://via.placeholder.com/60" alt="User 3"></div>
                <span>user_3</span>
            </div>
        </section>

        <article class="post">
            <div class="post-header">
                <div class="post-author">
                    <img src="https://via.placeholder.com/40" alt="Avatar" class="author-avatar">
                    <span class="author-name">astro_fanatic</span>
                </div>
                <i class="fa-solid fa-ellipsis"></i>
            </div>

            <div class="post-image" id="postImageContainer">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1000" alt="Post de astronomía">
                <i class="fa-solid fa-heart giant-heart"></i>
            </div>

            <div class="post-actions">
                <div class="action-left">
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-regular fa-paper-plane"></i>
                </div>
                <i class="fa-regular fa-bookmark"></i>
            </div>

            <div class="post-content">
                <p class="likes-count">1,245 Me gusta</p>
                <p class="post-caption"><strong>astro_fanatic</strong> ¡Explorando nuevos horizontes en el espacio! 🌌🚀 #astronomy #space</p>
                <p class="view-comments">Ver los 18 comentarios</p>
                <span class="post-time">HACE 2 HORAS</span>
            </div>
        </article>

    </main>

    <nav class="bottom-nav">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-solid fa-clapperboard"></i>
        <img src="https://via.placeholder.com/30" alt="Perfil" class="profile-icon">
    </nav>

    <script src="script.js"></script>
</body>
</html>
